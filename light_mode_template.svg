<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" font-family="ConsolasFallback,Consolas,monospace" width="985px" height="480px" font-size="16px">
<style>
@font-face {
src: local('Consolas'), local('Consolas Bold');
font-family: 'ConsolasFallback';
font-display: swap;
}
.key {fill: #b35900;}
.value {fill: #0550ae;}
.addColor {fill: #1a7f37;}
.delColor {fill: #cf222e;}
.cc {fill: #8c959f;}
text, tspan {white-space: pre;}
</style>
<rect width="985px" height="480px" fill="#ffffff" stroke="#e1e4e8" rx="15"/>

<!-- Generic terminal-style ASCII placeholder art (swap for your own) -->
<text x="15" y="30" fill="#24292e">
<tspan x="15" y="40">        .-------.        </tspan>
<tspan x="15" y="60">       /  .-. .-.  \       </tspan>
<tspan x="15" y="80">      |  |   |   |  |      </tspan>
<tspan x="15" y="100">      |   \_/ \_/   |      </tspan>
<tspan x="15" y="120">       \    ___    /       </tspan>
<tspan x="15" y="140">        '. \___/ .'        </tspan>
<tspan x="15" y="160">       .-'-.....-'-.       </tspan>
<tspan x="15" y="180">      /   .-----.   \      </tspan>
<tspan x="15" y="200">     |   /       \   |     </tspan>
<tspan x="15" y="220">     |  |       |  |     </tspan>
<tspan x="15" y="240">     |   \       /   |     </tspan>
<tspan x="15" y="260">      \   '-----'   /      </tspan>
<tspan x="15" y="280">       '-.._____..-'       </tspan>
<tspan x="15" y="330">      generated by today.py     </tspan>
</text>

<text x="390" y="30" fill="#24292e">
<tspan x="390" y="30">{{ handle }}@github</tspan> -———————————————————————————————————————————-—-
<tspan x="390" y="50" class="cc">. </tspan><tspan class="key">Editor</tspan>:<tspan class="cc"> .................... </tspan><tspan class="value">{{ editor }}</tspan>
<tspan x="390" y="70" class="cc">. </tspan><tspan class="key">Languages</tspan>:<tspan class="cc"> ................. </tspan><tspan class="value">{{ languages }}</tspan>
<tspan x="390" y="90" class="cc">. </tspan><tspan class="key">Interests</tspan>:<tspan class="cc"> ................. </tspan><tspan class="value">{{ interests }}</tspan>
<tspan x="390" y="110" class="cc">. </tspan><tspan class="key">Location</tspan>:<tspan class="cc"> .................. </tspan><tspan class="value">{{ location }}</tspan>
<tspan x="390" y="150">- Contact</tspan> -——————————————————————————————————————————————-—-
<tspan x="390" y="170" class="cc">. </tspan><tspan class="key">Email</tspan>:<tspan class="cc"> ..................... </tspan><tspan class="value">{{ email }}</tspan>
<tspan x="390" y="190" class="cc">. </tspan><tspan class="key">Website</tspan>:<tspan class="cc"> ................... </tspan><tspan class="value">{{ website }}</tspan>
<tspan x="390" y="210" class="cc">. </tspan><tspan class="key">LinkedIn</tspan>:<tspan class="cc"> .................. </tspan><tspan class="value">{{ linkedin }}</tspan>
<tspan x="390" y="250">- GitHub Stats</tspan> -—————————————————————————————————————————-—-
<tspan x="390" y="270" class="cc">. </tspan><tspan class="key">Repos</tspan>:<tspan class="cc"> .... </tspan><tspan class="value">{{ repos }}</tspan> {<tspan class="key">Contributed</tspan>: <tspan class="value">{{ contributed }}</tspan>} | <tspan class="key">Stars</tspan>:<tspan class="cc"> ........... </tspan><tspan class="value">{{ stars }}</tspan>
<tspan x="390" y="290" class="cc">. </tspan><tspan class="key">Commits</tspan>:<tspan class="cc"> .................. </tspan><tspan class="value">{{ commits }}</tspan> | <tspan class="key">Followers</tspan>:<tspan class="cc"> ....... </tspan><tspan class="value">{{ followers }}</tspan>
<tspan x="390" y="310" class="cc">. </tspan><tspan class="key">Lines of Code</tspan>:<tspan class="cc">. </tspan><tspan class="value">{{ loc_net }}</tspan> ( <tspan class="addColor">{{ loc_added }}</tspan><tspan class="addColor">++</tspan>, <tspan class="delColor">{{ loc_deleted }}</tspan><tspan class="delColor">--</tspan> )
<tspan x="390" y="340" class="cc">. </tspan><tspan class="key">Updated</tspan>:<tspan class="cc"> .................... </tspan><tspan class="value">{{ updated }}</tspan>
</text>
</svg>
